name: 福彩3D 每日预测

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 1 * * *'
    - cron: '50 12 * * *'
    - cron: '18 13 * * *'
    - cron: '0 14 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行预测
        run: python main.py predict

      - name: 提交数据更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "data: auto update" && git push)
