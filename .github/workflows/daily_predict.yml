name: 福彩3D 每日预测

on:
  schedule:
    # 北京时间 09:00 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
    # 北京时间 20:50
    - cron: '50 12 * * *'
    # 北京时间 21:18
    - cron: '18 13 * * *'
    # 北京时间 22:00
    - cron: '0 14 * * *'
    # 北京时间 06:30 (次日兜底)
    - cron: '30 22 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行预测
        run: python main.py predict

      - name: 提交数据更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "data: auto update" && git push)
